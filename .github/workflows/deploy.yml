name: Java 25 Build on Contabo

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: oracle-actions/setup-java@v1
        with:
          website: oracle.com
          release: 25

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 1: Copy ONLY the JAR and strip the 'target/' folder
      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar"
          target: "/root/app-deploy/"
          strip_components: 1
          debug: true

      # Step 2: Copy ONLY the Dockerfile (No stripping needed)
      - name: Copy Dockerfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "Dockerfile"
          target: "/root/app-deploy/"

      - name: Build Image and Restart Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/app-deploy/
            
            # Since the JAR is now directly in app-deploy, we rename it to app.jar
            # This ensures your Dockerfile 'COPY app.jar' command works every time
            mv *.jar app.jar || true 
            
            # Build the image using the Dockerfile now present in the folder
            docker build -t my-java-app:latest .
            
            # Stop and remove the old container if it exists
            docker stop my-app-container || true
            docker rm my-app-container || true
            
            # Start the new container
            docker run -d --name my-app-container \
              -p 8080:8080 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              my-java-app:latest