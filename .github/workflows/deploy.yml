name: Java 21 Build and Deploy to Contabo

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto' # Official OpenJDK build by Amazon

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar"
          target: "/root/app-deploy/"
          strip_components: 1

      - name: Copy Dockerfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "Dockerfile"
          target: "/root/app-deploy/"

      - name: Build Image and Restart Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/app-deploy/
            
            # Remove old app.jar to prevent "Not a directory" or "Multiple files" errors
            rm -f app.jar 
            
            # Find the new jar and rename it
            mv *.jar app.jar
            
            # Rebuild image without cache to ensure the new JAR is picked up
            docker build --no-cache -t my-java-app:latest .
            
            # Cleanup and Restart
            docker stop my-app-container || true
            docker rm my-app-container || true
            
            docker run -d --name my-app-container \
              -p 8080:8080 \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              my-java-app:latest