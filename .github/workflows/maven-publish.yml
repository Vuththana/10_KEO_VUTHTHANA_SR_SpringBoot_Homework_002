name: Deploy Spring Boot to Contabo

on:
  push:
    branches: [ "main" ]  # This triggers the deploy whenever you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: oracle-actions/setup-java@v1
      with:
        website: oracle.com
        release: 25

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Copy JAR to Contabo
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        password: ${{ secrets.SSH_PASSWORD }}
        source: "target/*.jar"
        target: "/home/root/"
        strip_components: 1

    - name: Restart Service on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        password: ${{ secrets.SSH_PASSWORD }}
        script: |
          # Ensure the directory exists
          mkdir -p /home/root/
          # Move and rename the new jar
          mv /home/root/*.jar /home/root/app.jar
          # Restart your systemd service
          sudo systemctl restart myapp
